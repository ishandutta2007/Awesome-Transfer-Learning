<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#140b3c"/>
      <stop offset="100%" stop-color="#05030f"/>
    </linearGradient>
    
    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Accent Gradients -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bgGrad)"/>

  <!-- Tech Grid Background Pattern -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 100,0 L 100,250 M 200,0 L 200,250 M 300,0 L 300,250 M 400,0 L 400,250 M 500,0 L 500,250 M 600,0 L 600,250 M 700,0 L 700,250" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05"/>

  <!-- Network Nodes and Connections -->
  <!-- Left Cluster -->
  <circle cx="100" cy="80" r="4" fill="#00f2fe" opacity="0.6"/>
  <circle cx="150" cy="140" r="6" fill="#7f00ff" opacity="0.8"/>
  <circle cx="80" cy="180" r="5" fill="#4facfe" opacity="0.7"/>
  <line x1="100" y1="80" x2="150" y2="140" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="150" y1="140" x2="80" y2="180" stroke="#7f00ff" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="80" y1="180" x2="100" y2="80" stroke="#4facfe" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Right Cluster -->
  <circle cx="700" cy="160" r="5" fill="#ff007f" opacity="0.7"/>
  <circle cx="640" cy="90" r="4" fill="#00f2fe" opacity="0.6"/>
  <circle cx="720" cy="70" r="6" fill="#7f00ff" opacity="0.8"/>
  <line x1="700" y1="160" x2="640" y2="90" stroke="#ff007f" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="640" y1="90" x2="720" y2="70" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="720" y1="70" x2="700" y2="160" stroke="#7f00ff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Central Flow/Representation Shift Diagram -->
  <path d="M 150,140 Q 400,30 640,90" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="5,5" stroke-opacity="0.6"/>
  <path d="M 150,140 Q 400,220 700,160" fill="none" stroke="#7f00ff" stroke-width="2" stroke-dasharray="5,5" stroke-opacity="0.6"/>

  <!-- Title Text -->
  <text x="400" y="105" font-family="'Segoe UI', -apple-system, sans-serif" font-size="38" font-weight="900" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">AWESOME</text>
  <text x="400" y="155" font-family="'Segoe UI', -apple-system, sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6">TRANSFER LEARNING</text>

  <!-- Subtitle -->
  <text x="400" y="195" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#a0aec0" text-anchor="middle" letter-spacing="1">A Curated Guide to Deep Representation Alignment &amp; Foundation Models</text>

  <!-- Border Highlight -->
  <rect x="5" y="5" width="790" height="240" rx="10" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-opacity="0.2"/>
</svg>
